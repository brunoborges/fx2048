<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">fx2048 logo</title>
  <desc id="desc">A playful 2048 game board with JavaFX styling and glowing merged tiles.</desc>
  <defs>
    <linearGradient id="background" x1="128" y1="64" x2="896" y2="960" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#faf8ef"/>
      <stop offset="0.52" stop-color="#f3d774"/>
      <stop offset="1" stop-color="#f65e3b"/>
    </linearGradient>
    <linearGradient id="board" x1="128" y1="160" x2="896" y2="864" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#bbada0"/>
      <stop offset="1" stop-color="#8f7a66"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#3c3a32" flood-opacity="0.32"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#background)"/>
  <circle cx="820" cy="188" r="86" fill="#edc22e" opacity="0.55" filter="url(#glow)"/>
  <circle cx="188" cy="818" r="112" fill="#f9f6f2" opacity="0.32"/>

  <g filter="url(#shadow)">
    <rect x="144" y="176" width="736" height="736" rx="96" fill="url(#board)"/>
    <g font-family="Clear Sans, Arial, sans-serif" font-weight="800" text-anchor="middle" dominant-baseline="central">
      <rect x="216" y="248" width="256" height="256" rx="44" fill="#eee4da"/>
      <text x="344" y="376" font-size="116" fill="#776e65">2</text>

      <rect x="520" y="248" width="256" height="256" rx="44" fill="#ede0c8"/>
      <text x="648" y="376" font-size="116" fill="#776e65">0</text>

      <rect x="216" y="552" width="256" height="256" rx="44" fill="#f2b179"/>
      <text x="344" y="680" font-size="116" fill="#f9f6f2">4</text>

      <rect x="520" y="552" width="256" height="256" rx="44" fill="#edc22e"/>
      <text x="648" y="680" font-size="116" fill="#f9f6f2">8</text>
    </g>
  </g>

  <path d="M680 178c66 32 122 88 154 154" fill="none" stroke="#f9f6f2" stroke-width="36" stroke-linecap="round" opacity="0.65"/>
  <text x="512" y="934" font-family="Clear Sans, Arial, sans-serif" font-size="72" font-weight="800" text-anchor="middle" fill="#776e65">FX</text>
</svg>
