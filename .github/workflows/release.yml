name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version, for example 1.0.2. Defaults to the current -SNAPSHOT version without -SNAPSHOT.'
        required: false
      next_snapshot_version:
        description: 'Next development version, for example 1.0.3-SNAPSHOT. Defaults to the next patch -SNAPSHOT.'
        required: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.release_version || github.ref_name }}
  cancel-in-progress: false

env:
  JAVA_VERSION: '25'
  JAVA_DISTRIBUTION: 'microsoft'

jobs:
  release-context:
    name: Prepare release context
    runs-on: ubuntu-latest
    outputs:
      release_ref: ${{ steps.tag-context.outputs.release_ref || steps.prepare-release.outputs.release_ref }}
      release_tag: ${{ steps.tag-context.outputs.release_tag || steps.prepare-release.outputs.release_tag }}
    steps:
      - name: Checkout default branch
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Set up OpenJDK ${{ env.JAVA_VERSION }}
        if: github.event_name == 'workflow_dispatch'
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          architecture: x64
          cache: maven

      - name: Prepare release tag and next snapshot
        id: prepare-release
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          RELEASE_VERSION_INPUT: ${{ github.event.inputs.release_version }}
          NEXT_SNAPSHOT_VERSION_INPUT: ${{ github.event.inputs.next_snapshot_version }}
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_SIGNING_KEY_USER_NAME: ${{ secrets.MACOS_SIGNING_KEY_USER_NAME }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail

          missing=()
          for name in MACOS_CERTIFICATE_BASE64 MACOS_CERTIFICATE_PASSWORD MACOS_SIGNING_KEY_USER_NAME APPLE_ID APPLE_TEAM_ID APPLE_APP_SPECIFIC_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              missing+=("${name}")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required macOS signing/notarization secrets: %s\n' "${missing[*]}"
            exit 1
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin "${DEFAULT_BRANCH}" --tags
          git pull --ff-only origin "${DEFAULT_BRANCH}"

          current_version="$(./mvnw --batch-mode --no-transfer-progress help:evaluate -Dexpression=project.version -q -DforceStdout)"
          if [[ "${current_version}" != *-SNAPSHOT ]]; then
            printf 'Current pom.xml version "%s" must end with -SNAPSHOT for automated release preparation.\n' "${current_version}"
            exit 1
          fi

          snapshot_base="${current_version%-SNAPSHOT}"
          release_version="${RELEASE_VERSION_INPUT:-${snapshot_base}}"
          if [[ "${release_version}" == *-SNAPSHOT ]]; then
            printf 'Release version "%s" must not end with -SNAPSHOT.\n' "${release_version}"
            exit 1
          fi

          next_snapshot_version="${NEXT_SNAPSHOT_VERSION_INPUT:-}"
          if [[ -z "${next_snapshot_version}" ]]; then
            if [[ ! "${release_version}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              printf 'Release version "%s" is not major.minor.patch; provide next_snapshot_version explicitly.\n' "${release_version}"
              exit 1
            fi
            next_snapshot_version="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.$((BASH_REMATCH[3] + 1))-SNAPSHOT"
          fi
          if [[ "${next_snapshot_version}" != *-SNAPSHOT ]]; then
            printf 'Next snapshot version "%s" must end with -SNAPSHOT.\n' "${next_snapshot_version}"
            exit 1
          fi

          release_tag="v${release_version}"
          if git rev-parse "${release_tag}" >/dev/null 2>&1; then
            printf 'Release tag "%s" already exists locally.\n' "${release_tag}"
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${release_tag}" >/dev/null 2>&1; then
            printf 'Release tag "%s" already exists on origin.\n' "${release_tag}"
            exit 1
          fi

          ./mvnw --batch-mode --no-transfer-progress versions:set -DnewVersion="${release_version}" -DgenerateBackupPoms=false
          git add pom.xml
          git commit -m "Prepare ${release_tag} release"
          git tag -a "${release_tag}" -m "fx2048 ${release_tag}"

          ./mvnw --batch-mode --no-transfer-progress versions:set -DnewVersion="${next_snapshot_version}" -DgenerateBackupPoms=false
          git add pom.xml
          git commit -m "Bump version to ${next_snapshot_version}"

          git push origin "HEAD:${DEFAULT_BRANCH}"
          git push origin "${release_tag}"

          printf 'release_tag=%s\n' "${release_tag}" >> "${GITHUB_OUTPUT}"
          printf 'release_ref=refs/tags/%s\n' "${release_tag}" >> "${GITHUB_OUTPUT}"

      - name: Use pushed tag
        id: tag-context
        if: github.event_name == 'push'
        shell: bash
        run: |
          printf 'release_tag=%s\n' "${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
          printf 'release_ref=%s\n' "${GITHUB_REF}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.label }} package
    needs: release-context
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ needs.release-context.outputs.release_tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS arm64
            java_architecture: arm64
            package_glob: target/dist/*.dmg
            package_suffix: macos-arm64.dmg
          - os: windows-2022
            label: Windows x64
            java_architecture: x64
            package_glob: target/dist/*.msi
            package_suffix: windows-x64.msi
          - os: ubuntu-latest
            label: Linux amd64
            java_architecture: x64
            package_glob: target/dist/*.deb
            package_suffix: linux-amd64.deb
          - os: ubuntu-24.04-arm
            label: Linux arm64
            java_architecture: arm64
            package_glob: target/dist/*.deb
            package_suffix: linux-arm64.deb

    steps:
      - name: Checkout the source code
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.release-context.outputs.release_ref }}

      - name: Set up OpenJDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          architecture: ${{ matrix.java_architecture }}
          cache: maven

      - name: Validate release version
        shell: bash
        run: |
          set -euo pipefail
          project_version="$(./mvnw --batch-mode --no-transfer-progress help:evaluate -Dexpression=project.version -q -DforceStdout)"
          expected_tag="v${project_version}"
          if [ "${RELEASE_TAG}" != "${expected_tag}" ]; then
            printf 'Release tag "%s" must match pom.xml version "%s" as "%s".\n' "${RELEASE_TAG}" "${project_version}" "${expected_tag}"
            exit 1
          fi
          printf 'PROJECT_VERSION=%s\n' "${project_version}" >> "${GITHUB_ENV}"

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes fakeroot

      - name: Install WiX Toolset
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $wixRoots = @(
            "${env:ProgramFiles(x86)}\WiX Toolset v3.14\bin",
            "${env:ProgramFiles(x86)}\WiX Toolset v3.11\bin"
          )
          $wixRoot = $wixRoots | Where-Object { Test-Path (Join-Path $_ 'candle.exe') } | Select-Object -First 1
          if (-not $wixRoot) {
            choco install wixtoolset --no-progress --yes
            $wixRoot = $wixRoots | Where-Object { Test-Path (Join-Path $_ 'candle.exe') } | Select-Object -First 1
          }
          if (-not $wixRoot) {
            throw 'WiX Toolset was not found after installation.'
          }
          $wixRoot | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure macOS signing keychain
        if: runner.os == 'macOS'
        shell: bash
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_SIGNING_KEY_USER_NAME: ${{ secrets.MACOS_SIGNING_KEY_USER_NAME }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail

          missing=()
          for name in MACOS_CERTIFICATE_BASE64 MACOS_CERTIFICATE_PASSWORD MACOS_SIGNING_KEY_USER_NAME APPLE_ID APPLE_TEAM_ID APPLE_APP_SPECIFIC_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              missing+=("${name}")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required macOS signing/notarization secrets: %s\n' "${missing[*]}"
            exit 1
          fi

          certificate_path="${RUNNER_TEMP}/developer-id-application.p12"
          keychain_path="${RUNNER_TEMP}/fx2048-signing.keychain-db"
          keychain_password="$(uuidgen)"

          printf '%s' "${MACOS_CERTIFICATE_BASE64}" | base64 --decode > "${certificate_path}"
          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"
          security import "${certificate_path}" -P "${MACOS_CERTIFICATE_PASSWORD}" -A -t cert -f pkcs12 -k "${keychain_path}"
          security list-keychains -d user -s "${keychain_path}"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${keychain_password}" "${keychain_path}"
          security find-identity -v -p codesigning "${keychain_path}"

          printf 'MACOS_KEYCHAIN_PATH=%s\n' "${keychain_path}" >> "${GITHUB_ENV}"

      - name: Build package
        if: runner.os != 'macOS'
        run: ./mvnw --batch-mode --no-transfer-progress -DskipTests package javafx:jlink jpackage:jpackage

      - name: Build signed macOS app image and package
        if: runner.os == 'macOS'
        shell: bash
        env:
          MACOS_SIGNING_KEY_USER_NAME: ${{ secrets.MACOS_SIGNING_KEY_USER_NAME }}
        run: |
          set -euo pipefail

          ./mvnw --batch-mode --no-transfer-progress -DskipTests package javafx:jlink

          runtime_max_heap="$(./mvnw --batch-mode --no-transfer-progress help:evaluate -Dexpression=runtime.max.heap -q -DforceStdout)"
          runtime_garbage_collector="$(./mvnw --batch-mode --no-transfer-progress help:evaluate -Dexpression=runtime.garbage.collector -q -DforceStdout)"
          app_image_dir="target/app-image"
          app_image="${app_image_dir}/fx2048.app"

          rm -rf "${app_image_dir}" target/dist
          mkdir -p "${app_image_dir}" target/dist

          jpackage \
            --type app-image \
            --dest "${app_image_dir}" \
            --name fx2048 \
            --app-version "${PROJECT_VERSION}" \
            --vendor "Bruno Borges" \
            --resource-dir src/jpackage \
            --module fxgame/io.fxgame.game2048.AppLauncher \
            --runtime-image target/fx2048 \
            --java-options -Dfile.encoding=UTF-8 \
            --java-options "${runtime_max_heap}" \
            --java-options "${runtime_garbage_collector}" \
            --mac-package-identifier fx2048 \
            --mac-package-name fx2048 \
            --icon src/main/resources/io/fxgame/game2048/fx2048-logo.icns \
            --mac-sign \
            --mac-signing-keychain "${MACOS_KEYCHAIN_PATH}" \
            --mac-signing-key-user-name "${MACOS_SIGNING_KEY_USER_NAME}" \
            --mac-entitlements src/jpackage/fx2048.entitlements

          codesign --force --timestamp --options runtime \
            --entitlements src/jpackage/fx2048.entitlements \
            --keychain "${MACOS_KEYCHAIN_PATH}" \
            --sign "${MACOS_SIGNING_KEY_USER_NAME}" \
            "${app_image}"
          codesign --verify --deep --strict --verbose=4 "${app_image}"
          codesign -d --entitlements :- "${app_image}" 2>&1 | tee /tmp/fx2048-entitlements.plist
          grep -q 'com.apple.security.cs.allow-jit' /tmp/fx2048-entitlements.plist
          grep -q 'com.apple.security.cs.disable-library-validation' /tmp/fx2048-entitlements.plist

          jpackage \
            --type dmg \
            --dest target/dist \
            --name fx2048 \
            --app-version "${PROJECT_VERSION}" \
            --vendor "Bruno Borges" \
            --resource-dir src/jpackage \
            --app-image "${app_image}" \
            --mac-package-identifier fx2048 \
            --mac-package-name fx2048

      - name: Sign macOS DMG package
        if: runner.os == 'macOS'
        shell: bash
        env:
          MACOS_SIGNING_KEY_USER_NAME: ${{ secrets.MACOS_SIGNING_KEY_USER_NAME }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          packages=( target/dist/*.dmg )
          if [ "${#packages[@]}" -ne 1 ]; then
            printf 'Expected exactly one DMG, found %s.\n' "${#packages[@]}"
            printf '%s\n' "${packages[@]}"
            exit 1
          fi

          codesign --force --timestamp \
            --keychain "${MACOS_KEYCHAIN_PATH}" \
            --sign "${MACOS_SIGNING_KEY_USER_NAME}" \
            "${packages[0]}"
          codesign --verify --verbose=4 "${packages[0]}"

      - name: Notarize and staple macOS package
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          packages=( target/dist/*.dmg )
          if [ "${#packages[@]}" -ne 1 ]; then
            printf 'Expected exactly one DMG, found %s.\n' "${#packages[@]}"
            printf '%s\n' "${packages[@]}"
            exit 1
          fi

          xcrun notarytool submit "${packages[0]}" \
            --apple-id "${APPLE_ID}" \
            --team-id "${APPLE_TEAM_ID}" \
            --password "${APPLE_APP_SPECIFIC_PASSWORD}" \
            --wait
          xcrun stapler staple "${packages[0]}"
          xcrun stapler validate "${packages[0]}"
          spctl -a -t open --context context:primary-signature -v "${packages[0]}"

      - name: Stage release asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          shopt -s nullglob
          packages=( ${{ matrix.package_glob }} )
          if [ "${#packages[@]}" -ne 1 ]; then
            printf 'Expected exactly one package matching "%s", found %s.\n' '${{ matrix.package_glob }}' "${#packages[@]}"
            printf '%s\n' "${packages[@]}"
            exit 1
          fi
          cp "${packages[0]}" "release-assets/fx2048-${RELEASE_TAG}-${{ matrix.package_suffix }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: fx2048-${{ matrix.label }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - release-context
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-context.outputs.release_tag }}
          name: fx2048 ${{ needs.release-context.outputs.release_tag }}
          files: release-assets/*
          generate_release_notes: true
